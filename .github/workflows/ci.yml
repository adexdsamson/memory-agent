name: CI

# The three jobs below are the exact quality gate documented in CONTRIBUTING.md.
# A green run here means a green local `uv run` of the same commands — nothing more,
# nothing less. Keep this file and the CONTRIBUTING "quality gate" section in lockstep.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a fast follow-up push doesn't queue behind a stale one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (hermetic, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # CONTRIBUTING targets 3.12–3.13 (some C-extension wheels lag on 3.14).
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      # `--extra dev` only: cloud/Postgres backends skip cleanly without credentials,
      # so the suite stays hermetic (no network, no Docker, no API keys).
      - name: Hermetic test suite
        run: uv run --extra dev pytest -q

  typecheck:
    name: pyright (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      # Cloud SDKs MUST be installed so pyright can resolve their types — a dev-only
      # run reports false "missing import" errors. See CONTRIBUTING "test gate ≠ type gate".
      - name: Type-check
        run: uv run --extra dev --extra cloud pyright

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Lint
        run: uv run --extra dev ruff check src/ tests/
